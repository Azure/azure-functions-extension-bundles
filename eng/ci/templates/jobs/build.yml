parameters:
  - name: official
    type: boolean
    default: false
    
jobs:
- job: Build
  displayName: Build and publish artifacts

  templateContext:
    outputParentDirectory: $(Build.ArtifactStagingDirectory)
    outputs:
    - output: pipelineArtifact
      displayName: Publish bundles
      path: $(Build.ArtifactStagingDirectory)
      artifact: zip

  steps:
  - task: NuGetAuthenticate@1
    displayName: 'NuGet Authenticate'

  - task: DownloadBuildArtifacts@1
    inputs:
      buildType: 'specific'
      project: '3f99e810-c336-441f-8892-84983093ad7f'
      pipeline: '963'
      buildVersionToDownload: 'latestFromBranch'
      branchName: 'refs/heads/dev'
      downloadType: 'single'
      artifactName: 'drop'
      downloadPath: '$(Build.Repository.LocalPath)\templatesArtifacts'
    condition: ${{ parameters.official }}

  - task: DotNetCoreCLI@2
    displayName: 'Build'
    inputs:
      command: 'run'
      workingDirectory: '.\build'
      ${{ if eq(parameters.official, false) }}:
        arguments: 'skip:DownloadTemplates,PackageNetCoreV3Bundle,PackageNetCoreV3BundlesWindows,CreateCDNStoragePackage,CreateCDNStoragePackageWindows,CreateCDNStoragePackageLinux,PackageNetCoreV3BundlesLinux'

  - pwsh: |
      $maxSize = 183500800  # 175 MB
      $ruZips = @(Get-ChildItem '$(Build.Repository.LocalPath)\artifacts\*_RU_package.zip')
      if ($ruZips.Count -eq 0) {
        Write-Error "RU package zip not found in artifacts directory"
        exit 1
      }
      $ruZip = $ruZips[0]
      $size = $ruZip.Length
      Write-Host "RU package size: $([math]::Round($size / 1MB, 2)) MB ($size bytes)"
      if ($size -gt $maxSize) {
        Write-Error "RU package size $size bytes ($([math]::Round($size / 1MB, 2)) MB) exceeds maximum allowed size of $maxSize bytes ($([math]::Round($maxSize / 1MB, 2)) MB). Review and consider optimizations"
        exit 1
      }
      Write-Host "RU package size is within limits."
    displayName: 'Validate RU Package Size'

  - ${{ if eq(parameters.official, true) }}:
    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(Build.Repository.LocalPath)\artifacts'
        Contents: '*.zip'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
        CleanTargetFolder: false
